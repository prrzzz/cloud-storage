<!DOCTYPE html>
<html>

<head>
    <title>My Cloud Storage</title>

    <style>
        body{
            font-family:Arial;
            margin:40px;
            background:#f2f2f2;
        }

        h1{
            color:#333;
        }

        .box{
            background:white;
            padding:20px;
            border-radius:10px;
            width:600px;
        }

        a{
            text-decoration:none;
            margin-left:10px;
        }
    </style>

</head>

<body>

<div class="box">

<h1>☁ My Cloud Storage</h1>

<form action="/upload" method="POST" enctype="multipart/form-data">

<input type="file" name="file">

<button type="submit">
Upload
</button>

</form>

<hr>

<h3>Uploaded Files</h3>

<ul>

{% for file in files %}

<li>

{{ file }}

<a href="/download/{{file}}">
Download
</a>

<a href="/delete/{{file}}">
Delete
</a>

</li>

{% endfor %}

</ul>

</div>

</body>

</html>
